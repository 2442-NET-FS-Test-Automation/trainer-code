<!DOCTYPE html>
<html lang="en">
<head> <!-- These are HTML Comments-->
    <!-- head contains metadata about the document
        things like language, charsets, etc. Doesn't render -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Catalog</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Body contains the stuff that DOES render. Typically (always) within HTML elements -->

    <!-- Some attributes are for CSS - class and id being the two that come to mind
            id = unique. Only this element can be identified by this id. Class = a group
                of elements. These class and id attributes can also be used by JS to target elements
                    and we'll see that later this week.-->

    <header class="site-header"> 
        <h1 id="heading">City Library</h1> <!-- These are HTML elements. -->
        <nav class="site-nav">
            <a href="index.html">Catalog</a> <!-- Elements can have attributes, like href
                                                  which lets your browser know what HTML page
                                                    to load when you click the link   -->
            <a href="login.html">Sign in</a> 
        </nav>
    </header>

    <main>
        <section id="catalog"> <!-- Some elements are self closing.-->
            <h2>Catalog</h2>
            
            <div class="toolbar">
                <!-- Our first input - a placeholder for searching the catalog -->
                <label for="search">Search:</label>
                <input type="search" id="search" name="search" placeholder="title or SKU"> <!--Self closing-->
                <span class="hint">try a SKU like BK-101</span>
            </div>

            <div class="cards" id="catalog-cards">

                <article class="card">
                    <h3>Clean Code</h3>
                    <dl>
                        <dt>SKU</dt><dd>BK-101</dd>
                        <dt>Price</dt><dd>29.99</dd>
                        <dt>In Stock</dt><dd>12</dd>
                    </dl>
                </article>

                <article class="card">
                    <h3>Dune</h3>
                    <dl>
                        <dt>SKU</dt><dd>BK-102</dd>
                        <dt>Price</dt><dd>19.99</dd>
                        <dt>In Stock</dt><dd>5</dd>
                    </dl>
                </article>

                <article class="card">
                    <h3>MDN Docs</h3>
                    <dl>
                        <dt>SKU</dt><dd>BK-103</dd>
                        <dt>Price</dt><dd>14.99</dd>
                        <dt>In Stock</dt><dd>6</dd>
                    </dl>
                </article>
            </div>

    

        </section>
    </main>

    <footer class="site-footer">
        <p>City library -- frontend demo (Library domain from earlier)</p>
    </footer>
    
</body>
</html>
